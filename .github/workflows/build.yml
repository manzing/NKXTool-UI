name: Build NkxToolGUI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Display .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore NkxToolGUI.csproj

      - name: Build
        run: dotnet build NkxToolGUI.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish NkxToolGUI.csproj --configuration Release --no-build --output publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NkxToolGUI-win-x64
          path: publish/**